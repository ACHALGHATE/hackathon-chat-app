<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol 👻</title>

    <!-- Firebase SDKs (compat version — no bundler needed) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>👻 Ghost Protocol</h1>
    <p id="subtitle">Anonymous · Temporary · Low-pressure</p>

    <!-- User Input -->
    <div class="input-group">
        <input type="text" id="usernameInput" placeholder="Your ghost name (or leave blank for random)">
    </div>
    <div class="input-group">
        <input type="text" id="messageInput" placeholder="Type your message..." maxlength="300">
    </div>
    <div class="input-group">
        <button id="postBtn">Post Message</button>
    </div>

    <p id="expiry-note">💀 Messages vanish after 24 hours</p>

    <!-- Messages Display -->
    <div id="messagesContainer">
        <p class="empty-msg">No messages yet. Be the first ghost! 👻</p>
    </div>

    <!-- script.js handles all logic -->
    <script src="script.js"></script>

</body>

</html>
